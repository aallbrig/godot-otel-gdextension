---
name: godot-otel
root: ~/src/godot-otel-gdextension

windows:
  - watch:
      layout: tiled
      panes:
        - dev:
            - clear
            - echo "watch — ready"
        - format:
            - task watch:format
        - lint:
            - task watch:lint
        - build:
            - task watch:build
        - test:
            - task watch:test
        - secrets:
            - task watch:secrets

  - sites:
      layout: main-vertical
      panes:
        - dev:
            - clear
            - echo "sites — ready"
        - hugo:
            - task site:dev
