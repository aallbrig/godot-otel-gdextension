name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  # ── Pre-commit checks (quality gates) ──────────────────────────────────────
  pre-commit:
    name: Pre-commit (gitleaks, formatting, YAML/TOML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pre-commit/action@v3.0.1

  # ── C++ lint: format check ────────────────────────────────────────────────
  lint-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src/ \( -name '*.cpp' -o -name '*.h' \) -exec clang-format --dry-run --Werror {} \;

  # ── C++ build ─────────────────────────────────────────────────────────────
  build:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake clang ninja-build libssl-dev libcurl4-openssl-dev

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ hashFiles('CMakeLists.txt') }}-${{ runner.os }}
          restore-keys: cmake-deps-

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Upload compiled extension
        uses: actions/upload-artifact@v4
        with:
          name: gdextension-linux-debug
          path: demo/addons/otel/bin/
          retention-days: 3

  # ── C++ lint: clang-tidy ─────────────────────────────────────────────────
  lint-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake clang clang-tidy ninja-build libssl-dev libcurl4-openssl-dev

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ hashFiles('CMakeLists.txt') }}-${{ runner.os }}
          restore-keys: cmake-deps-

      - name: Configure CMake (generate compile_commands.json)
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Run clang-tidy
        run: |
          find src/ -name '*.cpp' | xargs clang-tidy \
            -p build \
            --warnings-as-errors='*'

  # ── GDUnit4 tests ─────────────────────────────────────────────────────────
  test:
    name: GDUnit4 tests (headless)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download compiled extension
        uses: actions/download-artifact@v4
        with:
          name: gdextension-linux-debug
          path: demo/addons/otel/bin/

      - name: Make library executable
        run: chmod +x demo/addons/otel/bin/*.so || true

      - name: Install GDUnit4
        run: |
          curl -sL "https://github.com/godot-gdunit-labs/gdUnit4/archive/refs/tags/v6.1.3.tar.gz" \
            | tar -xz -C /tmp/
          mv /tmp/gdUnit4-6.1.3/addons/gdUnit4 demo/addons/gdunit4

      - name: Install Godot
        run: |
          GODOT_VERSION="4.3-stable"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/
          chmod +x "/tmp/Godot_v${GODOT_VERSION}_linux.x86_64"
          echo "GODOT=/tmp/Godot_v${GODOT_VERSION}_linux.x86_64" >> $GITHUB_ENV

      - name: Run unit tests
        working-directory: demo
        run: |
          $GODOT --headless \
            -s res://addons/gdunit4/bin/GdUnitCmdTool.gd \
            --add res://test/unit \
            --report-directory /tmp/gdunit4-unit \
            2>&1 | tee /tmp/gdunit4-unit.log
          grep -E 'FAILED|ERROR' /tmp/gdunit4-unit.log && exit 1 || true

      - name: Run integration tests (including installation validation)
        working-directory: demo
        run: |
          $GODOT --headless \
            -s res://addons/gdunit4/bin/GdUnitCmdTool.gd \
            --add res://test/integration \
            --report-directory /tmp/gdunit4-integration \
            2>&1 | tee /tmp/gdunit4-integration.log
          grep -E 'FAILED|ERROR' /tmp/gdunit4-integration.log && exit 1 || true

      - name: Verify addon distribution structure
        run: |
          echo "Checking addon structure..."
          test -f demo/addons/otel/otel.gdextension || (echo "Missing otel.gdextension"; exit 1)
          test -f demo/addons/otel/bin/libotel.so || (echo "Missing libotel.so"; exit 1)
          echo "✓ Addon structure valid and ready for installation"

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gdunit4-reports
          path: /tmp/gdunit4-*/
          retention-days: 7

  # ── Secret scanning ────────────────────────────────────────────────────────
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Hugo site build ────────────────────────────────────────────────────────
  site:
    name: Hugo build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go (for Hugo modules)
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Install npm deps
        working-directory: site
        run: npm ci

      - name: Build OTel JS bundle
        working-directory: site
        run: npm run otel:build

      - name: Build Hugo
        working-directory: site
        run: hugo --minify

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public/
